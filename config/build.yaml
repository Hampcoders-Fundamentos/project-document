input-files:
  - report/00-caratula.md
  - report/01-registro-versiones.md
  - report/02-collaboration-insights.md
  - report/04-student-outcome.md
  - report/10-cap1-introduccion.md
  - report/20-cap2-requirements-analysis.md
  - report/30-cap3-requirements-spec.md
  - report/40-cap4-product-architecture-design.md
  - report/90-conclusiones.md
  - report/91-bibliografia.md

output-file: dist/glottia-report.pdf

pdf-engine: lualatex
toc: false
toc-depth: 4
number-sections: false
file-scope: true

resource-path:
  - "."
  - "assets/img"
  - "assets/img/cap1"
  - "assets/img/cap2"
  - "assets/img/cap3"
  - "assets/img/cap4"
  - "assets/img/general"

variables:
  geometry: [left=0.8in, right=0.8in, top=1in, bottom=1in]
  mainfont: "Arial"
  fontsize: 10pt
  colorlinks: true
  linkcolor: "blue"
  lang: "es"
  logo: "assets/img/general/upc-logo.png"
  titlepage: true
  titlepage-color: "FFFFFF"
  header-includes:
    - \usepackage{graphicx}
    - \usepackage{float}
    - \usepackage{seqsplit}
    - \usepackage{needspace}
    - \usepackage{enumitem}
    - \usepackage[table,xcdraw]{xcolor}
    - \makeatletter
    - \def\fps@figure{H}
    - \def\fps@table{H}
    - \makeatother
    - \setkeys{Gin}{width=\linewidth,height=0.45\textheight,keepaspectratio}
    - \usepackage{longtable}
    - \usepackage{array}
    - \usepackage{booktabs}
    - \usepackage{tabularx}
    - \usepackage{etoolbox}
    - \setlength{\tabcolsep}{6pt}
    - \renewcommand{\arraystretch}{1.5}
    - \AtBeginEnvironment{tabular}{\small}
    - \AtBeginEnvironment{tabularx}{\small}
    - \AtBeginEnvironment{longtable}{\small}